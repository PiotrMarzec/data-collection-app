<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be right back</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #334155;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #eff6ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: #3b82f6;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .75rem;
      color: #1e293b;
    }

    p {
      font-size: .975rem;
      line-height: 1.6;
      color: #64748b;
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 2rem;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%            { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 6v6l4 2m6-2a10 10 0 1 1-20 0 10 10 0 0 1 20 0z"/>
      </svg>
    </div>
    <h1>We'll be right back</h1>
    <p>The application is updating. This usually takes less than a minute — please refresh the page shortly.</p>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</body>
</html>
