@if (isLoggedIn) {
  <app-admin-panel (logout)="doLogout()" (sessionExpired)="onSessionExpired()" />
} @else {
  <div class="login-view">
    <div class="login-card">
      <h1>Admin Panel</h1>
      <label for="password-input">Password</label>
      <input
        type="password"
        id="password-input"
        [(ngModel)]="password"
        placeholder="Enter admin password"
        autocomplete="current-password"
        (keydown.enter)="doLogin()"
      />
      <div class="error-msg">{{ loginError() }}</div>
      <button
        class="btn btn-primary"
        id="login-btn"
        [disabled]="loggingIn()"
        (click)="doLogin()"
      >Sign in</button>
    </div>
  </div>
}
