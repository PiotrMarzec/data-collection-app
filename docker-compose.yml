services:

  db:
    image: postgres:16-alpine
    container_name: dc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_collection
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d data_collection"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ${IMAGE}
    container_name: dc-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: "9666"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/data_collection
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_SIGNATURE_SECRET: ${APP_SIGNATURE_SECRET}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_API_TOKEN: ${APP_API_TOKEN}
      APP_WELCOME_TITLE: ${APP_WELCOME_TITLE:-Welcome!}
      APP_WELCOME_DESCRIPTION: ${APP_WELCOME_DESCRIPTION:-You have been invited to complete your registration. Please provide your email address to continue.}
    ports:
      # Bind only to localhost — Caddy is the only entry point
      - "127.0.0.1:9666:9666"
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
