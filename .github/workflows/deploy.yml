name: Build and Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Build Docker image and push to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Deploy to VM
  #
  # Uses the "production" GitHub Environment — all secrets live there.
  # No secrets are stored on the VM; .env is (re)written on every deploy.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production   # unlocks environment-scoped secrets

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/data-collection-app

      - name: Write .env and restart app
        uses: appleboy/ssh-action@v1
        env:
          # Injected into the runner environment from GitHub Secrets,
          # then forwarded to the remote shell via the "envs" parameter.
          # GitHub automatically masks these values in the Actions log.
          IMAGE: ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PGDATA_PATH: ${{ secrets.PGDATA_PATH }}
          APP_SIGNATURE_SECRET: ${{ secrets.APP_SIGNATURE_SECRET }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
          APP_API_TOKEN: ${{ secrets.APP_API_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE,DB_USER,DB_PASSWORD,PGDATA_PATH,APP_SIGNATURE_SECRET,APP_ADMIN_PASSWORD,APP_API_TOKEN
          script: |
            set -e
            cd /opt/data-collection-app

            # Recreate .env from GitHub Secrets (no secrets stored permanently on the VM).
            # Using individual echo statements avoids heredoc indentation issues in YAML.
            {
              echo "IMAGE=${IMAGE}"
              echo "DB_USER=${DB_USER}"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "PGDATA_PATH=${PGDATA_PATH}"
              echo "APP_SIGNATURE_SECRET=${APP_SIGNATURE_SECRET}"
              echo "APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}"
              echo "APP_API_TOKEN=${APP_API_TOKEN}"
            } > .env
            chmod 600 .env

            # Pull the new app image.
            docker compose pull app

            # Start all services.
            # - First deploy: starts both db and app.
            # - Subsequent deploys: db config is unchanged so Docker Compose
            #   leaves it running; only the app container is recreated.
            docker compose up -d

            # Reclaim disk space from dangling images.
            docker image prune -f
