# ============================================================
# Application
# ============================================================
quarkus.application.name=data-collection-app

# ============================================================
# Database (PostgreSQL)
# ============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=app_user
quarkus.datasource.password=app_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/data_collection

# ============================================================
# Hibernate ORM
# ============================================================
quarkus.hibernate-orm.database.generation=none

# ============================================================
# Flyway
# ============================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ============================================================
# Signature secret (CHANGE THIS IN PRODUCTION!)
# ============================================================
app.signature.secret=my-super-secret-key

# ============================================================
# Admin panel password (CHANGE THIS IN PRODUCTION!)
# ============================================================
app.admin.password=changeme

# ============================================================
# External API token (CHANGE THIS IN PRODUCTION!)
# ============================================================
app.api.token=changeme-api-token

# ============================================================
# OpenAPI / Swagger UI
# ============================================================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ============================================================
# Welcome page configuration
# ============================================================
app.welcome.title=Welcome!
app.welcome.description=You have been invited to complete your registration. Please provide your email address to continue.
